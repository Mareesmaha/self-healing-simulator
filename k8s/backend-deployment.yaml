apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulator-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: simulator-backend
  template:
    metadata:
      labels:
        app: simulator-backend
    spec:
      containers:
        - name: simulator-backend
          image: simulator-backend:v2
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: simulator-backend-service
spec:
  selector:
    app: simulator-backend
  ports:
    - port: 3000
      targetPort: 3000
  type: NodePort